name: Bug report
description: Report a reproducible problem in Stellar Stream.
title: "[Bug]: "
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened, and which part of the app is affected?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps needed to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened?
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: What happened instead?
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, Node version, wallet, network, or deployment details.
      placeholder: |
        OS:
        Browser:
        Node:
        Network:
    validations:
      required: true
