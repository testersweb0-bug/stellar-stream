name: Feature request
description: Suggest an improvement or new capability for Stellar Stream.
title: "[Feature]: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or developer problem should this solve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the change you would like to see.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches or workarounds have you considered?
    validations:
      required: false
