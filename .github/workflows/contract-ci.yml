name: Soroban Contract CI

on:
  push:
    paths:
      - "contracts/**"
      - ".github/workflows/contract-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contract-ci.yml"

jobs:
  contract-test:
    name: Build and test Soroban contract
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('contracts/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check contract formatting
        run: cargo fmt --all -- --check

        - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit (contracts)
        working-directory: contracts
        run: |
          cargo audit --json > cargo-audit-report.json || true
          cargo audit

      - name: Upload cargo audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cargo-audit-report
          path: contracts/cargo-audit-report.json
          retention-days: 30

      - name: Run contract tests
        env:
          RUSTFLAGS: "-D warnings"
        run: cargo test --locked